name: Build APK we Depanne

# Se déclenche à chaque envoi de code (push) et manuellement (bouton "Run workflow")
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Installer Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer Flet
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Construire l'APK
        run: flet build apk --verbose

      - name: Publier l'APK (téléchargeable)
        uses: actions/upload-artifact@v4
        with:
          name: wedepanne-apk
          path: build/apk/*.apk
          if-no-files-found: warn
